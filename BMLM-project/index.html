<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bake More Love More website">
    <title>BMLM</title>
    <link rel="stylesheet" href="style.css">    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Log in form -->
     <div class="header">
        <p class="welcome"><span class="hide">Welcome to </span>Bake More Love More</p>
        <img class="logo" src="BM_LM.png" alt="logo">
    </div>
    <div class=container>
        <h1>Log In</h1>
        <form>
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="Enter your Email" required />
            <label for="password">Password: </label>
            <input type="password" id="password" name="password" placeholder="Enter your Passwords" required />
            <div class="inline">
                <label for="check">
                    <input type="checkbox" id="check" name="remember-me" class="customize" /> Remember me
                </label>
                <p><a href="#">Forgot password?</a></p>
            </div>
            <button type="submit">Log In</button>
            <p class="sign-up">Don't have an account yet? <a href="#">Sign Up</a></p>
        </form>
    </div>
</body>
</html>
